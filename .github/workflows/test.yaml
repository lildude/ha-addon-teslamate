name: Test

on:
  push:
    branches:
      - main
    paths:
      - build.yaml
      - config.yaml
      - build.json
      - config.json
      - Dockerfile
      - rootfs/**
  pull_request:
    branches:
      - main
    paths:
      - build.yaml
      - config.yaml
      - build.json
      - config.json
      - Dockerfile
      - rootfs/**

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build add-on
    strategy:
      matrix:
        arch: ["amd64", "aarch64"]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build add-on
        uses: home-assistant/builder@62a1597b84b3461abad9816d9cd92862a2b542c3 # 2026.03.2
        with:
          args: |
            --test \
            --${{ matrix.arch }} \
            --target /data/ \
            --addon

      - name: Image labels
        run: |
          docker inspect ghcr.io/lildude/ha-addon-teslamate-${{ matrix.arch }} --format='{{json .Config.Labels}}' | jq
